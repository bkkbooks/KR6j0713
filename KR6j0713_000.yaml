front:
  text: 序吾儕經史之暇亦喜染指首楞嚴經徒以房相筆受文字工美無乖名教而已若夫剖析心觀斷定綱宗以昭示來茲非具大根願不能也歷觀有唐以來注疏不下百十家或淺而未至或悖而相左未免有經在微塵之嘆至於最僻謬而灼違經旨者莫交光正脈若矣經研識心為成道之本渠云不用六識經祥三觀為入道之階渠云不用三觀是何殊自任孝子而打擲父母欲其入門而閉之戶耶紕繆種種莫可枚舉揆厥所由不間藏誨妄自師心而已天台全彰法師得佛祖真印秉判釋權衡約總別以論觀心而十卷之靈文顯揭境觀以定修證而一經之宗旨彰即六識以顯真常由三觀而趨佛果不惟千秋不決之案於茲大定而交光僻謬之說亦迎刃而解矣昔溫陵戒環以無根之說妄翳法華百松大師秉筆鉞而披其荊棘共快法華之再觀今交光正脈以僻謬之疏蕪穢楞嚴全彰法師摻如椽而誅其悖逆競瞻佛頂之舒光古稱孟子闢揚墨其功不在禹下百松全公其法華楞嚴之功臣歟顧楞嚴即長水子璿法師虔講楞嚴感雨華之瑞全公定解適成於茲地殆長水後身乎不然何能剖析心觀定千秋不決之案若是之章明校著乎哉雖然吾因之有所惜焉此書立義有本闢邪無避光明正大之氣凜凜乎溢於溫文妙辨之表詩謂不剛不柔筆舌之間似之矣假令秉此筆而立朝則必讜言直論匡濟當寧否則被繡衣巡方國亦必埋輪京輦去暴鋤強而竟為浮屠取重可惜也雖然國法禁人為惡佛法勸人為善今而後懸是書於國門回謬執以正人心翊王道而裨名教奚啻繼禹孟而羡流德之遠哉微文具在必有覩余言而嘆實獲矣時康熙庚申仲夏長水里人扗臻拜題楞嚴定解序首楞嚴經余自嶺表載蘇即屬意翻討為人稱道間閲諸家注疏非不文采可觀然求其剖判精明位置確當釋迦之心髓泠然修心之初後俱攝不少槩見今年春全彰法師以楞嚴定解見示蓋全合天台止觀總別觀心之旨而成者也止觀十章惟正觀總無明心別觀能招報心楞嚴十卷亦惟正推總無明心別詳能招報心其間意符理合不爽錙銖佛乘祖誥宛同合璧是楞嚴得止觀而觀心之旨顯止觀得楞嚴而總別之說徵似乎二聖抵掌商略以開千百世衆生出生死證菩提之觀心捷徑也讀之再三不覺手舞足蹈拍掌大呼曰而今而後釋迦之心神骨髓和盤托出略無遺蘊而智者之總別觀心現行發得信而有徵可謂前日不定而今日定矣夫經論之照世譬如龍劍雌雄離魂倩女全公之前二劍各分身魂彼此全公之後雌雄合而飛鳴倩女合而一身也經云譬如琴瑟琵琶箜篌雖有妙音若無妙指終不能發今佛祖異口同心之妙得全公妙指合而發之矣即其細文小節字字照入觀心前呼後應言言點歸總別正如天半神龍首動尾應一氣回翔了無間隙下睨諸家注疏無非隔羅望月糢糊射覆而已何況猜大定而妄非三觀執用根而却排六識者之臆見左說哉至於消釋文句處嘗引幽溪即中者連篇纍紙或前以一二語貫之或後以一二字收之竟成全公心內妙談絶無抄録朕迹且使舊疏語句益覺精深如王摩詰於水田飛白鷺夏木囀黃鸝上加漠漠陰陰字而宛成輞川的境且使古詩轉覺雋永又如李光弼將子儀軍號令所及精采悉變此以真見識真智慧真筆力真學問而成奪胎之法揭千聖未闢之祕以定千秋不決之疑者也豈近代勦襲陳言掇門請客者比哉倘謂余稱道過實者試觀楞嚴翻譯以來百十家注疏內曾有如此剖判精明位置確當觀心之初後俱攝佛祖之心髓泠然否康熙庚申春日丹霞山比丘今釋槃談撰自序大品云豈聲聞人有所說哉有所說者皆是佛力蓋承佛力加被以說佛所說也是解也豈靈耀有所說哉有所說者亦皆佛祖之說而已釋迦說總別觀心之法於楞嚴智祖說總別觀心之法於止觀言或存略而指歸只一經約解行證法以明修途即止觀正用十乘妙觀觀總無明心也止觀前六章依修多羅以開妙解即楞嚴會三科七大皆本如來藏妙真如性也楞嚴陰魔七趣即止觀所揀現行發得能招報心也耀惟仰承佛祖冥加點會二說只一觀心經營十稔成十二卷使後之有志觀心者知甘露門之在茲更毋棄識心屏三觀之異趣異說是曰觀心解耳而言定者向來注疏具曰豫聖神襟各是而莫或適從今惟以佛祖觀心之旨會佛祖觀心之旨起盡㳷合無餘文剩義似乎千聖復起莫越斯道妙玄云法華是定非不定今此解亦是定非不定之謂也至於劇談七大性藏三番圓別進否仰遵幽祖即中而間亦雜采長水桐洲諸說其銷文細節坐收即中已成科句居多故曰是解也豈靈耀有所說哉有所說者皆是佛祖之說而已也辛酉菊月天台比丘靈耀謹序
