body:
  text: 天台比丘靈耀述將欲定解此經先提言外大綱略為四章一判總別二定境觀三釋題目四系凡例一判總別者非題目為總經文名別之謂也蓋指前七卷正觀總無明心以明修證後三卷約別能招報心以明修證為總別耳此經判釋百十餘家千眼互呈紛紜不一或約兩章分文或約五章或約六章惟是根源未清而位置尚無著落此定解之所由作而竟忘其鄙陋也竊謂如來出世説此經者為欲示六凡衆生破惑業報障以顯本如來藏妙真如性秪由一切衆生於真性中一念不覺而有動即為無明覆於覺性所謂藏識海常住境界風所動而晦昧為空空晦暗中也此是惑障非業報二障是總無明心非能招報心是障理非牽生是理惑非事惑是根本非枝末是獨頭非相應上八地人雖得暫停業報三乘聖人雖得邐迤進破三界枝末事惑而不牽生三有皆是中途未得究竟良由此根本未除故祕藏不顯妙性不彰也是以佛在楞嚴會上且置其枝末相應之能招報而先破除根本障理之總無明心根本既除枝末自消所謂伐樹得根灸病得穴之捷徑法也如經因阿難之請先竟徵定迷妄根本為所破所觀之境次用最初方便七番破性一喝破相開示奢摩他路然後會三科以顯森羅融七大而歸中道一切如來之密因妙解足而大佛頂之本如來藏出矣然此但是圓解見到耳若欲起修入證猶未在也是以當機有請入華屋之求而如來詳示圓通本根正助修法所謂如登絶壑必假飛梯要契真源須憑妙行也至於五十五位真菩提路正是所修所證妙果如是則一切如來之密因皆屬了義而諸菩薩之萬行皆究竟堅固矣即最初一念不覺而有動以覆本覺之總無明心亦淨盡無餘而歸無所得宜問經名以入流通矣此前七卷半經文正觀總無明心以明修之梗概也第如上所明破顯修證以顯大佛頂體只約無明一念心王而已其如一念不覺而有動動即有苦遂沿蔓而為五識五意識之相應十習受想行之遷流諸心此等枝末或貪或嗔或淫或詐或誑或妄日日現行時時搆業惑與業俱即能招報夫習既遠於一真報乃招夫七趣是為現行能招報即七卷之十習因也所招之報即七卷之六交報也夫積習成性性不可改有所著重世世發現縱有暫時起修工夫無奈習染數發或起煩惱或起染愛或發業病或發禪見如張僧繇世世為畫師堪忍國番番現舊境冢人不淨金師數息慣習自然妨害禪定牽入輪回是為發得能招報因如九卷已去詳辨陰魔中五十種禪那現境是也經云若不明悟被陰所迷則汝阿難必為魔子成就魔人及身遭後有墮無間獄五陰魔終結云各以所愛先習迷心而自休息所感業終墮無間獄等是所招報果也此二種心是枝末非根本是業障報障非惑障是相應非獨頭是能招報心非總無明心是牽生非障理是事惑非理惑佛既破其一念總無明心會三如來藏而明修證已復愍衆生攀緣處多枝末未去則方當禪觀深修之時現行與宿習驀發密因萬行不得深入而大佛頂體不得究竟堅固故精研七趣以示十習因之現行能招報詳辨陰魔以斥因修發習之發得能招報須知此二雖非根本無明然而害定牽生為障尤甚所當盡破者也此二既去則吾心之性藏佛頂方得究竟堅固而如來菩薩之密因萬行皆圓滿菩提歸無所得矣是後三卷約別能招報心以明修證之事也惟能招報中復有現行十習之五識三心因修發宿之五十陰魔不同固當別作兩章研詳破斥之也問前七卷約總無明心中有破有顯有解行證法周全詳悉後三卷約別能招報心中不惟行證之文不具抑且破顯之解不談何得條然對列為總別兩章耶答如來説法詳略咸宜無明根本障理過重應當詳悉以明修證招報事惑枝末極粗只須略點以出其過令人不著便可任運流入歸無所得矣如經中破五陰竟即云識陰若盡乃超十信十住十行十向四加行十地入於如來妙莊嚴海豈非修證之旨宛然俱備其解行等法例上可知亦何必重重羅列哉是則約別以明修證之法詳在約總章中非此有彼無也若總若別隨于一門得入皆可究顯性藏故宜兩章對列不可軒輊爾天台大師説己心中所行法門則成十章止觀西域梵僧見之曰此書與西竺楞嚴經相同大師求經證論而未之見今録止觀輔行成文略加點釋以會通之不惟止觀有懸合楞嚴之妙益顯楞嚴位置觀道俱有著落止觀五上正修章中列十境已先觀陰境餘九至下方觀而陰境有三科不同心是惑本若欲觀察須伐其根如灸病得穴當去丈就尺去尺就寸置色等四陰但觀識陰識陰者心王也即列十乘觀法輔行釋云世出世陰如條如病一念心識如根如穴若爾觀心即足何故第四破法遍末更例觀餘陰界入答欲融諸法示觀體遍是故下文例餘陰入若示境體觀心即足又正示境體陰界入三並可為觀寬漫難入故促指的略二就陰如去丈就尺略四從識如去尺就寸今且觀心王置於心所故初觀識餘下例之問五識五意識並能生於受等三心何等識心及所生心是今觀境答五識五意識定是今境未屬煩惱在無記故於第六中取能招報者仍須發得乃屬煩惱餘之分別方是今境又此五識五意識雖在今境仍在下文歷緣對境中明在止觀六下第四破法遍約橫竪一心明止觀中兩章一約總無明心即所揀陰入心王也所謂秪就無明一念心此心具三諦即三觀二歷餘一心三觀者若總無明心未必是宜更歷餘一心或欲心嗔心慢心此等心起即空假中還如總中説又云前來所説但觀識陰作如此説餘四陰亦復如是十二入十八界亦如是輔行二十八云總觀無明未必是宜開總出別無明心中具諸心故問貪等即是煩惱所攝何名觀陰答雖是煩惱善惡所攝況此但觀欲等心王若爾與煩惱境何別耶答此是煩惱非煩惱境彼由觀發昔此過現習生與下不同故今在此其實煩惱非報陰也雖即屬陰攝陰不盡是故下復例餘陰入上是止觀輔行成文今略釋會止觀揀界入四陰而的就識陰心王用十乘妙觀觀之正先破根本總無明心破已即顯觀成入理證祕密藏與今經前七卷半正觀總無明心以明修證有破有會開解起行入真菩提路無二無別其所揀退之五識五意識受想行心直至第四破法遍後更歷餘一心例餘陰入用上圓觀觀破者與今經精研七趣等十習因宛同止觀輔行名欲心嗔心慢心即楞嚴之貪習嗔習詐習等十習因者也蓋止觀但名能招報之因心而楞嚴并詳所招之七趣六交報也如經云云何六報一切衆生六識造業所招惡報從六根出正指識與根塵相應造作諸業是能招報六交惡報即所招報也結鬼道云是人皆以純情墮落業火燒乾上出為鬼此等皆是自妄想業之所招引妄想即五識五意識受想行三心與根塵因緣而造業是能招報鬼趣即所招引苦報也又結畜生云此等亦皆自妄想業之所招引如寶蓮香比丘尼及璃琉王善星比丘如來惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受如經所明節節皆結能招之惑所招之報與止觀輔行所明現行能招報分毫不爽人苦不能細心會通故佛祖心印尚埋於側理也至釋文時再為點出止觀所置九境所謂仍須發得乃屬煩惱於下九境中一一各用十乘觀破與今經詳辨五十種陰魔是同蓋止觀九境因修以發宿習倘不覺察即被牽入輪回是名發得能招報故須一一備用十乘觀破庶可圓顯祕藏今經因在三摩定中觸動宿習或是天魔邪鬼外境惡緣伺便互發以害禪定牽入苦輪正是發得能招報所當詳辨而破斥之也如經破五陰魔竟總結云各以所愛先習迷心而自休息所感業終墮無間獄各以所愛先習迷心即因觀發昔之能招報心而自休息即住境不進或住禪見業惱乃至二乘之九境五十陰魔業終墮獄即所招報果也此二雖俱屬於枝末能招報但一是現行習因一是因修發昔故不同爾如云彼因觀發昔此過現習生是也即輔行云於第六中取能招報仍須發得乃屬煩惱者正是輔行幽贊止觀以明詳揀之言取能招報者取取去也謂取去五識五意識受想行心此等心法與根塵相應勢必造業以招七趣報苦者故今且揀去至下歷餘心中觀仍須發得乃屬煩惱者此揀餘九境發得則觀不發不觀若一發起即能害觀牽生故名發得能招報亦且揀去至觀陰十乘完已方用十乘觀破之也而例餘陰入即止觀第四破法遍末云於總無明心未必是宜更歷餘一心或欲心嗔心此等心起即空假中還如總中説又云前來所説但觀識陰作如此説餘四陰亦復如是十二入十八界亦如是輔行云觀總無明未必是宜開總出別則總別二章瞭然明白矣夫現行發得兩種枝末既詳研不滯自然流入妙真如性故知止觀中觀總無明心例歷陰入九境心的是今經前七卷約總無明心以明修證後三卷約別能招報以明修證之兩大章纖毫不異也問今經約總破顯必解行證法俱周圓已方研七趣止觀乃於觀陰十乘中第四破法遍末即例餘心焉得同耶答經中佛酬當機之請但貴破其根本無明則枝末現行自爾消亡而圓解大開矣因之躡解起行行窮位極皆任運流入法門攸敘從始至終不可攙越他語也次因阿難有七趣何來之疑故復示能招七趣苦報之因即現行枝末之十習因而所招之報即為七趣耳天台大師觀一念以顯不思議境已勢必遍破五住虗妄既約總無明心遍破諸法已惟恐像末行人謂觀心王能如是遍破未知觀已前揀下之五識三心亦能如是遍破否耶故即例之曰歷餘一心皆三諦三觀約餘陰入亦如是也則知經論研例雖似前後而先總後別義意本同也問今經證果之後方辨陰魔止觀觀陰才畢行證未説即觀九境何耶答佛乃究竟果人説己心中所證法門自當詳明果位大師權居五品説己心中所行法門只須十乘即足故止觀宜於觀陰十乘後即觀發得能招報而楞嚴宜於證果已竟方辨發得五陰魔也問今經前七卷既單就總無明心以明修證何得第二卷中有破五陰六入十二處及説七大二十五圓通等耶答此因奢摩他真空已顯理須融會諸法以成圓中大解非別觀界處枝末也與止觀方至第四破法遍中即例一切亦欲融境遍作如此説之意巧合也大師求楞嚴以證止觀而不知止觀全是楞嚴是則楞嚴雖未經大師手判而的是圓頓止觀明矣雖然大師豈有不知亦示為不知云爾應真云吾來欲參文殊却見了東土小釋迦宜乎二佛之同心經論之一轍也先賢注釋非無才辨顧於七趣五陰兩章俱無定指後二既無著落轉覺前俱射覆箕臼各是而莫肯相下楞嚴一經迄為千秋不決之疑案矣靈耀每臨講授雖亦仰遵先注支吾一時而不能釋然之懷於行住坐臥終不放下今者幸得佛祖同心之旨不敢自私書公後哲庶幾竭斯蠡測仰報佛恩敢言剖塵出經為決疑之定論哉二定境觀者此經的依現前一念識陰心王為所觀境以即空假中為能觀觀觀此一念即顯三如來藏妙真如性直至圓滿大佛頂而後已蓋此因心未迷之先亦惟此既迷之後亦惟此名字開解亦惟此究竟果成亦惟此所謂迷則三道流轉悟則果中勝用理則性德緣了事則修德三因如是四重皆依迷中實相而立是也衆生既迷此已即有體上虗妄枉受輪回今欲返本亦須研究本源方能去妄如從地倒還從地起即十方如來所以得究竟果成顯大佛頂體亦不過完滿得此本有一念而已豈更有所增別有所修哉譬如大圓鏡智忽染塵埃其黑如漆亦此鏡也但多鏡上妄塵而已及欲顯鏡本光亦只依鏡揩磨非離鏡別有顯光之法也工程既到塵淨光生亦只完得本有鏡光非鏡外別有增加也但無其迷妄耳演若達多迷妄狂走本頭不失狂歇得頭豈亦更有增哉一切如來初觀陰心得成極果復愍一切衆生一念陰心中皆具十方三世如來智慧德相但以妄想執著而不證得故得得出世多方開示使只研究當人本有陰心自顯未迷之本有也故今楞嚴會上初因阿難啓請十方如來得成菩提之法佛即為渠次第審問提出此一念陰心為所觀境如云如是見性是心非眼等蓋一切世間中不出名與色若欲如實觀但當觀名色若人識得心大地無寸土況佛法太高衆生太廣初心為難若觀心者近而復要故今經示行人近而復要之根本陰心為所觀境以顯三如來藏大佛頂體也須知大佛頂體豈離心別有哉亦只完得吾人現前一念本心而已耳蓋此心一念未起之先三千冥伏為理具一念既動之後三千並興為事造但於事造之時有染淨兩緣不同淨緣起為三千並常俱體俱用染緣起為三千在迷同曰無明無明者不明也即體上虗妄如鏡上塵埃元非本有迷而妄生者也佛教衆生研破此妄故用七番徵逐而令此一點精魂虗妄命根無躲藏處贓賊既現直與一喝斷其積妄所謂命根下殺一刀也此妄既去如大圓鏡光明自現不從外得原依本心而彰顯之矣故觀現前一念而顯不思議境是即妄即真最捷徑最圓頓法也世人不知却謂現前一念識心全體是妄不可憑之顯真豈知此心體全是真哉況經多番揀斥徵逐性計俱空本明自露如止觀揀境相應現行之諸妄無依唯此一念心王現前言一念則已空千念萬念所謂識得一則萬事畢也舉心王則已去現行發得諸心作使唯此主人公矣言現前則不為昏煩業報蓋覆而孤明獨露矣此一點孤明獨露之處豈非奢摩他現前耶唯是一念即三千三千即一念一念不在前三千不在後不一不異而妙假宛然森羅畢現非空非有而禪那自在中道圓明如鏡塵既去光明自現非外來非內出而不思議境即識陰以彰豈不彰明較著矣乎然豈獨此經佛令衆生觀究現前陰心哉經經皆爾論論皆然佛令比丘觀四念處行道菩薩觀識受想行色至一切種智起信云有法能起摩訶衍信根所謂法者一切衆生心是又妙法者心是妙心體具如如意珠則華嚴之法界法華之實相涅槃之祕藏般若之智慧皆即心以論也若謂心外有法即實相外有法矣祖師云陰界入三並得為境蓋行人受身誰不陰入重擔現前故也若觀心者近而復要則識心者乃起觀之處入理之門矣良由心能諸佛心能衆生心能天堂心能地獄心即諸佛心即衆生亦由諸佛即心衆生即心天堂即心地獄即心生佛有迷悟而此無迷悟生佛有隱顯而此無隱顯生佛有三世而此獨常住古人云無心而已介爾有心三千具足故一切衆生全憑此心在洪波浩渺中出生死證菩提十方諸佛亦由究竟此心於三界五濁之內起大悲轉法輪度衆生若必掃除不用則斷衆生成佛之本滅諸佛得道之基矣況此經特重約心以明破顯融心以成祕藏而必曰不用殆亦超過諸佛之説耶交光曰不用天台六識殊不知此之識心乃諸佛衆生共有之大本詎可推與天台一家乎譬如日月在天有目皆見盲人不見謂天無日而并欲天下之人皆不見日有是理乎然交光用根不用識之言亦有所據但錯會之爾渠見經中七番破性之後阿難猶認推窮尋逐者為心而如來直下一喝曰此非汝心交光據此即曰識心已經如來親口破斥故不宜用殊不知如來所破攀緣尋逐乃體上虗妄非破識體主人公也此一毫聯纖虗妄若在則昏擾紛紜理即全迷佛既喝破則如鏡淨明生心體頓現如下所謂性識明知覺明真識清淨本然周遍法界是也豈磨去鏡上塵垢者并棄去鏡體光明也哉但在前為塵妄所染則不變隨緣真如在迷迷名六識至今妄去體彰則隨緣不變周遍法界即性識明知何曾有二哉又如垢衣內身瓔珞莊嚴只一長者非離去垢衣內身別有一瓔珞法身也故知此非汝心者正破體上垢妄耳交光錯會乃謂必破識體而不用矣又因五卷有識性虗妄猶如空華之句謂破六識更不知此段通破陰入界之虗妄也至云知見立知即無明本知見無見斯即涅槃無漏真淨豈非知見體上虗妄既無即知見體是涅槃藏性乎天台觀六識以顯不思議境深得佛旨而立非無本而云然也即用根之言亦據經文起修之始佛示二十五圓通而獨選耳根為入道之方便彼遂偏執此經專用耳根豈知言耳根者但入門方便也蓋行人起修二十五種門門可為入道方便今娑婆衆生耳根最利宜于耳聞入心成觀故特選之當知觀成理顯之時早已忘却外來耳聞方便矣豈有始終滯于方便而能心觀圓成耶方便猶如叩門之瓦度河之筏耳若滯著耳根而不能入心成觀則此耳根反成障礙膠纏住著為生死根本牽入輪回不暇矣經云衆生處處著佛説入門之方便世人即執方便為真實而不能入真深可憐愍者秪如觀音大士于古觀音如來所初于聞中入流亡所所入既盡動靜二相了然不生則耳根音塵二俱亡去矣然後得如是盡聞聞所聞盡而聞性亦空矣聞性既無方得覺所覺空而空觀現前未聞住著耳根色法頑空之上可以空覺極圓者也可知住著耳根之上即空觀尚是難成何況寂滅現前之圓中妙觀哉須知耳乃色質頑空全是生死無知之法如何依之開解起行耶不但深修妙觀不可憑依即淺近聞聲亦非耳根所得而有也必仗內有識心之主以應外塵方得有聞經云如是見性是心非眼古人云心不在焉視而不見聽而不聞食而不知其味不其然乎若云修屬聞性則聞性即識而有枝本之異故觀音心觀少成即云聞所聞盡而并此聞性亦遣之矣則知今經密因修證的依陰心為所觀境而顯大佛頂體若最初入門方便暫假耳聞爾經云歸元理無二方便有多門二十五聖豈非多乎從耳門入豈非方便乎若執此經由耳根方便而入即為耳根圓通者何經不從耳根入哉身子目連由聞因緣悟入亦耳根圓通也迦葉陳如聞四諦善來悟道亦耳根圓通也凡華嚴鹿苑方等般若法華涅槃五十年中證悟弟子皆稟佛音教而入皆耳根圓通也香嚴擊竹百丈一喝曹溪聞應無所住而生其心皆耳根圓通也此皆得圓通之方便耳須知佛逗娑婆之機率令從耳根方便而入何得錯會佛意偏執方便為此經真實觀境哉如經云十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚但於一門深入一入無妄彼六知根一時清淨又佛告文殊此二十五無學菩薩各説最初成道方便皆言修習得其圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就據此明文灼然是言入門方便何曾指為究竟真實哉及文殊承命揀選亦云歸元性無二方便有多門聖性無不通逆順皆方便又云誠如佛世尊詢我諸方便於此門無惑方便易成就處處皆言方便何曾指耳根為究竟耶但諸經方便皆從耳入而不明言若分明指選獨在今經也則知用根不用識之言真為棄本逐末者也且問耳根之所以能聞以何為本從何所來耶夫本以一精明分成六和合在耳曰聞在眼曰見乃至在身曰觸則知本一心識如一獼猴遍映六窗故有見聞覺知之用若無內心主人公則外之眼耳六根色質頑空何能聞見哉經云如是見性是心非眼即可云如是聞性是心非眼矣經云汝在室中門能見否則諸已死云何無見試例言之汝在室中門能聞否則諸已死云何無聞聞性方便尚恃識心根本而有云何偏計色空之根為入道究竟法耶豈非棄本逐末之已甚者乎言以即空假中為能觀觀者此經阿難初請十方如來得成菩提妙奢摩他三摩禪那最初方便而如來則先用最初方便之假七番徵逐破其妄計次以真諦一喝斷其習相然後次第引掖開顯奢摩他解而從假入空之觀成矣至汝猶未明一切浮塵諸幻化相當處發生隨處滅盡其性真為妙真如性如是乃至五陰六入十二處十八界亦復如是是從空出假會一切法皆本如來藏森羅畢現而三摩觀境成然後融七大色心皆性色真空性空真色清淨本然周遍法界是二觀為方便得入中道第一義觀而禪那之請酬若約破會邐迤先奢摩次三摩而論則同瓔珞次第三觀若據圓會三如來藏離即離非是即非即而論即大品一心三觀蓋開示行人修法言不頓彰事難率爾必須次第至妄去真窮理皆一貫法必圓融又非次第則破惑不盡非圓融則妙解不圓況經在方等先別後圓部意尤清故阿難雖請妙奢摩他之圓融三觀而至如來為其開示則阿難仍為示中下但作次第領解次第再問直至當機內解既開方為遍融一切同成性藏以酬阿難最初三觀皆妙之請也且今經三觀之法乃十方如來成菩提之正軌法界衆生出生死之要訣具縛凡夫妄想紛紜必仗空慧蕩洗情塵如金剛王寶劒直下斬斷命根寸絲不滯方得塵淨光生本真獨露至此則待對既絶諸妄消亡一念不生名相總滅元無空觀之名但衆生向來妄心膠著萬有賴此妙慧當前直下空諸行有假名空觀而已豈真有一空觀在胸中哉此中若存一空觀之名則大有所有生死正長矣何能出生死哉秪如三藏無常即始自迦羅終至圓著如劫火燒須彌大地蕩盡無餘況奢摩他真空得力哉世人偏執耳根方便為真實良由曾未染指小空耳豈惟人哉即上地諸天禪定雖深無此空慧故但能伏斷思假而不能破去諸見全住輪回持戒比丘檢束身口如擎油鉢何等艱苦亦由無此空慧但能暫轉業報而見思全在生死何辭故知此一空慧乃四教行人三世諸佛出世成道之根本所以今經惟重空如來藏也雖然但恐妄心不空耳心既空已則任運法法現成頭頭合道森羅宛具名假觀三摩不有不空即中道禪那如鏡垢既去法爾現像鏡光明三不一不異是圓融三觀而其實只觀識陰以顯乎本有一心也本心之上亦無三觀之假名十方諸佛因用此妙慧破去諸妄究竟本心故歷指自己所歷程途以昭示來茲令衆生可依之而遄征先登道岸故有三觀之名也交光不知此妙乃謂三觀屬在天台不可依用夫周行大道貴賤率由若衆生安心火宅則自然不必依行苟欲競出苦輪豈有捨此別趨者哉所謂出必由戶何莫由斯也苟謂不可依用是杜絶法界衆生出生死成菩提妙奢摩他三摩禪那之正路而使之竟入搆生死入三途之邪道矣悲乎且此三觀正道阿難因不知而請如來因請而示必先奢摩次三摩後禪那答其所問章章明白如何推與天台一家耶天台不過依經立字為法施菩薩而已況此三觀法門不獨説於楞嚴會上瓔珞説三觀大品明三觀圓覺説三觀涅槃亦三觀寶積説三觀若乃類通三觀則道識性般若菩提大乘身涅槃三寶德一一皆三法舉五十年中所談如來成菩提衆生出生死從迷至悟自淺之深之要法莫外乎三觀妙慧矣如何不可依用如何推在天台耶若果三觀勿依不惟絶法界衆生出生死之正道且顯如來一代時教皆錯談矣即如來當日由三觀以人寶所之程途皆錯謬矣即十方如來由此奢摩三摩禪那以成菩提之菩提亦未必成矣靈耀幸遇佛乘得伸鑽仰識雖暗短志在利人恐來者不知謗法墮苦略一辨明非苟執偏私妄陳是否倘有偏斯天龍譴責三釋題目為二初釋經題二釋譯人經題中先釋本題次釋別名總題例有五重今作四番解釋一標章二解釋三引證四生起初標章者此經以人法為名如來藏妙真如性為體楞嚴妙定為宗斷愛遠塵為用方等被開成醍醐為教相二解釋者一釋名此經以人法為名名有通別大佛頂如來密因修證了義諸菩薩萬行首楞嚴十九字別名也經之一字通名也今先釋別名即中云別名中共有三句初大佛頂三字為一句次如來下為第二句次諸菩薩下為第三句向後結經共有五名今首題中存三隱二故但十九字也初三字桐洲引吳興解指為密呪之名其説最是然考經中義非一途如云佛頂光明摩訶悉怛哆般怛囉無上神呪斯為如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪又云亦説此呪名如來頂非從密呪得名乎首卷經云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路則大佛頂之言又從顯教得名無疑矣大是稱體之讚佛頂是尊極之稱良由覺體妙明無相可得遍一切處超出群有四眼二智所不能窺名大佛頂顯説之即為經密説之即為呪豈有二耶所言密者非祕密法輪之密秪以梵語未翻秦人不解故云密爾此經緣阿難示墮淫室方遭邪染心雖明了而力不自由于義為著相非妙明無相尊極之呪安使解脫經中名此呪為如來頂者蓋名此呪為妙明無相超絶之法也而從頂光化佛説之者蓋道之難知聖人必示之以象故從釋迦之頂現無為心佛説無上心呪從能示言之佛字可指釋迦應身頂字可含釋迦化身然頂即無見頂相直顯法身華嚴云初生疾捧持諦觀不見頂正指此相西域記云昔婆羅門以一竹杖長一丈六欲量佛身才丈六已又一丈六量既不已插地而去其杖成林後于此中而立精舍名為杖林又金剛密迹經云佛成道後遊波羅奈東方去此甚遠有佛號思惟華世界名懷調有菩薩名應持來禮佛足繞千匝已念欲量佛身即自變形高三百三十萬里復見佛身高五百四十三萬兆垓二億里以佛神力應持往至上方百億恆沙世界界名蓮華莊嚴佛名蓮華上至彼界永不見釋尊之頂不知佛身遠近幾何往問彼佛彼佛答言更過恆沙劫亦不能見釋尊之頂智慧言辭光明悉亦如是據上經文無見頂相之為法身明矣從此頂而現化佛必是從法起報故經云于時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐如經所言華臺上佛豈非報耶報身全是智慧方能顯法身無相之道故説呪獨敕文殊是則能示中雖示三身而正以無相法身為主此示象之意也從此頂説呪正示呪理尊極妙明無相更何疑乎此表示神呪所詮之理亦表經文所詮之理顯密雖殊其體無二吳興云經題非喻是法亦屬于人不其然乎三身是人理體即是法也問何不言佛身而言佛頂答若言佛身遍該空有今言佛頂惟在中道無相之法釋籤云空假即中中為經體中即空假亦指于中三諦無非遍一切處據籤此文三諦咸遍經體惟中今但以無相為佛頂然何往而非佛頂耶大佛頂義浩妙無窮上所解者略中之略而已次如來密因修證了義八字為一句如來是證果之人文句引成實論云乘如實道來成正覺故名如來句即釋云乘是法如如智實是法如如境道是因覺是果據此知如之一字當以境智釋之謂境如于智智如于境也來之一字當以因果釋之謂乘因中如實之道來成正覺之果也密因者密為祕密大經哀歎品云何等名為祕密之藏猶如伊字三點若並則不成伊縱亦不成如摩醯首羅面上三目乃得成伊三點若別亦不得成我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃我今安住如是三法為衆生故名入涅槃如世字大經所説是如來三德祕藏之果而果必有因肖果之因稱為密因何等是耶所謂苦即法身惑即般若業即解脫如是解知名為密因也經云五陰六入從十二處至十八界因緣和合虗妄有生因緣離別虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求于去來迷悟生死了無所得如經所言詎不密乎問何不指妙奢摩他三摩禪那為密因耶答此妙三止已兼于修當先取解悟為因衆生無始以來唯有煩惱業苦而其體即三德此義最密能解此者即解三止何以故絶思議故離根塵故今正指三止之解為密因也修此密因名了義之修如簡圓通以耳根為此方之機宜是已依此而證名了義之證如五十五位真菩提路是已了義者謂詮義究竟如空假非了中道為了隔別非了圓中為了今經有權有實會權歸實莫非了義是可定一經之宗矣三諸菩薩萬行首楞嚴為一句菩薩是因中之人諸名不一一菩薩已具衆行況諸菩薩之所修乎古人釋此名引第八卷五十七位從因至果以當萬行説亦非謬但位名證得行名進趣豈直于位而當于行當指欲入位及已入位時所修為行則合經旨又此經徵心辨見五陰三科七大及諸圓通依此而修具一切菩薩法式故在般若為菩薩歷劫修行在今經稱萬行首楞嚴也經云首楞嚴王具足萬行據此當以首楞大定為總萬行為別總定具別稱之為王涅槃云首楞者一切事竟嚴名堅固一切畢竟而得堅固名首楞嚴又大論云首楞嚴者秦言健相分別知諸三昧行相多少深淺譬如大將知諸兵力多少菩薩得是三昧諸煩惱等不能破壞如轉輪王主兵將寶所至之處無敢壞者故亦翻為事究竟也此可含今經之用上如來是人密因等是法菩薩是人萬行等是法雖顯教所詮密呪中寧不具此義耶問昔孤山釋經題云具三為名桐洲非之今何具三章之義耶答妙玄云釋名總論三法體宗用開對三法覩今楞嚴經題方知古云釋名是總三章是別言實有據但大佛頂屬體密因修證是宗于義咸合唯菩薩萬行是因中之事似應屬宗不應屬用然釋籤解玄義十妙而云境是體是法身智行是宗是用彼文行妙是用今菩薩萬行何得非用總別之釋更無可疑次釋通名經者訓法訓常依此言説詮顯性相令物生解故稱為法一切諸佛皆同此説故稱為常有翻無翻具如妙玄説釋名竟二辨體者此經以如來藏妙真如性為體若據經題以大佛頂為體蓋小乘經有三印大乘唯一印印即是體小乘明生死與涅槃異生死中以無常為初印無我為後印二印印説生死涅槃但用一寂滅印是故須三有此三法知是佛説修之得道無三法印即是魔説故以三法為體也大乘生死即涅槃涅槃即生死無二無別唯是一實相名實相印無量義經云無相不相不相無相名為實相解云無相者無生死相不相者不涅槃相而又云不相無相者并不涅槃相亦無相也今大佛頂乃由證此實相之理成無見頂相為三十二相之一相究論其體即實相法身故特名大佛頂也此體雖衆生本具唯佛證得妙玄云今取佛所見為今經正體不其然乎而復取如來藏性者是文意之所歸一經之盛談即題中大佛頂之義故標為體何謂文意所歸經明諸三摩提文云一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性此文方出如來藏性之名然世尊言之殊非率爾蓋必三番進否而後明其義行謂進謂進明圓教也何謂否謂覆圓用別也何謂三番進否經于七處徵心之後阿難疑心無體爾時世尊開示阿難及諸大衆欲令心入無生法忍于師子座摩阿難頂而告之言如來常説諸法所生唯心所現一切因果世界微塵因心成體此第一番開示唯心是進明圓教然欲阿難識取其心必先撥去前塵獨顯見性故有前塵自暗見何虧損之語乃至云燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼初卷末有性心失真認物為己之責匿王章云汝面雖皺而此見精性未嘗皺皺者為變不皺非變變者受滅彼不變者元無生滅如上經文是第一番揀妄明真為圓教之否蓋不明唯心則圓宗不立不揀妄緣則真心不顯故選擇于客塵之間頻煩乎主空之辨良有以也初明諸法惟心則諸法皆常豈非圓乎次之主客對分生滅與不生滅逈然二途豈非別乎而謂楞嚴純明圓教不亦謬乎用別為入圓之方便經稱最初方便意在于此次阿難復執見聞不生滅者即是真性佛徵顛倒所在茫然不知佛興慈悲發海潮音遍告同會云色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物此指正報惟一真心又云色身外洎山河虗空大地咸是妙明真心中物此兼指依報唯一真心經立譬結責云譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如來説為可憐愍者如上經文是第二番進明唯心前第一番止是立宗今第二番鬯明圓旨然阿難自呈所悟復以緣心允所瞻仰故佛以指月主客為喻重就見性顯云明還日輪暗還黑月通還戶牖壅還墻宇緣還分別頑虗還空𡋯還塵清明還霽汝見八種見精明性當欲誰還諸可還者自然非汝不汝還者非汝而誰後文復云物類自有差別見性無殊又云若不見吾不見之地自然非物云何非汝夫如前經所言若依若正皆是妙明真心中物今又揀去物類獨顯真見此第二番覆圓説別也蓋不重明惟心則圓旨不鬯不退明見性則妄緣不除所以為圓教之否庶阿難疑團豁然由方便而得入圓宗阿難復疑見有舒縮佛斥云一切衆生從無始來迷己為物失于本心為物所轉是故于中觀大觀小若能轉物則同如來身心圓明不動道場于一毫端遍能含受十方世界是第三番進明圓理也前二番進明圓理則論惟心退明別教則論見性今第三番只就見性結歸圓理又前論惟心尚通于因今毛吞芥納直就果德開示乃至後文云此見及緣元是菩提妙淨明體云何于中有是非是亦就見性以歸圓也次阿難復以自然因緣為問如來一一逐破乃至云見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞如經所説見性離外塵明矣又云見見之時見非是見見猶離見見不能及如經所説見性離內根明矣是第三番退明別教也前云此見及緣元是菩提豈非圓教次則根塵明暗空塞皆非見性豈非別教更示同別二種妄見咸為圓教之否蓋不三示圓理則佛境不現不嚴揀妄見則偽根不除嗣後經文復破和合非和合以竟三番進否之局三番之後方結歸如來藏性明諸三摩提所以者何前三番用別意在三番進圓圓宗大旨在明惟心心體遍圓含十方界即是如來藏性藏以含藏為義必先知心量而後及于藏性方表其名結歸之次第然也後七常住名中稱空如來藏圓通章云立大圓鏡空如來藏詎非文旨所歸乎何謂一經盛談經于五陰三科文首雖揭如來藏妙真如性之名及後結文但云本非因緣非自然性意未全露惑者尚謂雖有藏名未見所藏之法因以中道了義為請如來始會地水火風無邊虗空明了之見分別之識罔非性德此示性具之法也夫達惟心了體具者則知圓旨前二卷盛明唯心至三卷方明性具是則惟心為性具之門性具乃惟心之旨性具既彰如來藏顯當機至此始悟一即一切心體遍含乃有消我億劫顛倒想不歷僧祇獲法身之偈此從圓教得悟其旨明矣然性具諸法具無具相故滿慈示為迷惑立水火相陵之難空地俱遍之疑如來因此又言妙覺明心先非水火廣明如來藏理而云本妙圓心俱非十界此即空之義也元明心妙俱即十界此即假之旨也妙明心元離即離非是即非即此即中之道也至此則如來藏理究竟彰顯圓解開發殆無餘疑圓行圓證實基于此嗟夫世人之惑也久矣如第三卷中廣明性具以彰藏義古今解者尚言性中定無水火循發似異故性受七大之名此師不達性具見後文有觀性元真惟妙覺明妙覺明心先非水火之語遂以第四卷意解第三卷之文不知七大止一藏性性中具七明文了然舉一全該一切亦爾此自性一多互容之妙不然何以名如來藏乎又第四卷中言妙覺明心先非水火云何復問不相容者此文非謂性中先無水火後起水火應知先字與復字對看言妙心已非水火豈應復問不相容者蓋即水非水即火非火故稱妙心解者惑云先在性時雖有性水性火而無相水相火故無陵滅若謂性中總無水火即違性具之旨此師謂性中必具水火乃以第三卷意解第四卷之文當知性具水火即非水火故古人云具無具相全體即空使此妙性有一法可得何以稱空如來藏乎今時解者例引寶積三如來藏用釋楞嚴然考今經止有空如來藏無餘二名但立一名其義亦足空即真諦藏即俗諦如來即是中道此三即一稱空如來藏寶積非多今經非少七卷中云妙性圓明離諸名相本來無有世界衆生九卷中云精研七趨皆是昏沉諸有為相于妙圓明無作本心皆如空華元無所著十卷云入于如來妙莊嚴海圓滿菩提歸無所得皆是其義故一經盛談莫過于此題稱大佛頂者謂無相之體遍含法界不廣明如來藏性豈顯大佛頂之義哉妙玄云體者禮也君父之體尊臣子之體卑彼文意指實相為君父諸法為臣子當知大佛頂如來藏性之言是貴極之法也問孤山以常住真心為體今胡不爾答心名隨緣性名不變具足當以心性為體今從體底之釋舉要言之但云性耳又常住之言即是藏義何者妙玄云小乘灰斷無如意珠身據此文即知如意珠身方名常住謂果上現十法界身説法利生如如意珠王隨意雨寶因中先具此心亦名常住此與如來藏性多所含藏而無積聚有何異耶故但釋藏名即談常住辨體竟三明宗者以楞嚴妙定為宗若據經題以如來密因修證了義為宗宗者尊也要也經之有宗如屋有梁柱網有網維為一經之主宰正行人之趨向然前云大佛頂為貴極之法則體實至尊今又以字為尊其故何哉應知體約實相之理宗約修證之事若非妙宗體何由顯體為宗家之體宗為顯體之宗體亦屬宗故宗為綱要也楞嚴妙定三止觀在一心中若能解了即是密因修謂修此妙定證謂證此妙定于修證中大概以即三之一稱了義也此經阿難當機首請十方如來得成菩提妙奢摩他三摩禪那最初方便古今解者其説不一孤山作三止釋其言云梵語奢摩他此云止止于真諦即體真止也梵語三摩提此云等持離沉掉曰等住心一境曰持止于俗諦即方便隨緣止也梵語禪那此云靜慮止于中道第一義諦即息二邊分別止也首楞嚴是奢摩等通名奢摩他等是首楞嚴之別號阿難智慧力多三昧力少既以多聞小慧自咎正以楞嚴大定為請吳興云孤山專用三止配今三名斯得經之深也然資中用圓覺經作三觀釋夫圓覺經云一切諸菩薩無礙清淨慧皆依禪定生所謂奢摩他三摩提禪那據此則三皆名定明矣又圓覺經云奢摩他至靜三摩正憶持禪那明數門是名三淨觀據此則三皆名觀又明矣圓覺先以奢摩等三名通乎止觀今經何獨不然第二卷云爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞于奢摩他微密觀照心猶未了經云奢摩他又云微密觀照豈非即止之觀耶向下發明同別二種妄見正是奢摩他微密觀照盛談入空之道則真諦中具有止觀復何疑乎真諦既爾中假亦然夫三摩提元翻等持既離沉掉專心一境正是止義妙樂二十九卷五十八紙云三昧從定陀羅尼從慧今經中既云大陀羅尼豈無觀慧耶由是言之三摩提中必具止觀禪那中道定慧不二抑又不必言矣釋名者或以為止或以為觀其説咸是但不可偏執今以三名咸具止觀為正解也又有師云奢摩他翻止三摩提翻觀禪那雙收止觀義實無礙然考翻譯未見所出涅槃經中乃以奢摩他翻止毗婆舍那翻觀畢叉為止觀等今經亦云奢摩他中用諸如來毗婆舍那此名方是止觀豈得直以三摩為觀耶考圓覺云奢摩他寂靜如鏡現諸像三摩提起幻如苗漸增長禪那唯寂滅如彼器中鍠據圓覺經文此三名的是空假中也今以三法在一心中方名為妙即中云古來解經者元不用三觀分科近代分文始開三觀其説有二一者如交光正脈以楞嚴前三卷半科為奢摩他性定道理從請入華屋去至説呪以前科為三摩嗣後經文總名禪那此説大謬何者經七徵之初即云有三摩提名大佛頂首楞嚴王具足萬行二卷五陰三科名諸三摩提妙修行路而總判為奢摩于義可乎彼嫌七徵初有三摩提之名乃強解云隨便寄居此科既非餘科盡不可依也二者南方諸師以徵心辨見之文為奢摩他五陰已去為諸三摩提七大之文科為禪那幽溪科亦然此得如來次第三觀之旨但辨見文首請示奢摩他路乃經文自説更有何疑而七徵之初文云有三摩提解者總判為奢摩于義可乎良由諸師不善用瓔珞經文故立科不順得瓔珞意洞然無疑瓔珞初卷五紙云從假入空觀亦名二諦觀從空出假觀亦名平等觀二觀為方便得入中道第一義諦觀心心寂滅自然流入薩婆若海此經文正明次第三觀何不引之以科楞嚴耶蓋三摩提屬如幻之假于義無疑圓覺經云三摩提起幻今經亦云如幻三摩提然則以三摩提為假觀者本于二經非臆説也又大論云迦羅是實時三摩耶是假時據大論文亦顯三摩是假故知今經徵心辨見宜屬空觀而七徵之首云有三摩提辨見之初請開示奢摩他路所謂從假入空觀也止觀云觀假為入空之詮空由詮會不其然乎況所立之科與瓔珞經合可無惑矣但從假入空元非正意今經圓別並明圓為正意別為旁意圓教初心從假入時即具三諦如妙玄云見思幻破真諦幻成無知幻破俗諦幻成無明幻破中道幻成今文亦然達此假法三觀咸備即具萬行故有三摩提下即云名大佛頂首楞嚴王具足萬行此圓義也若別人修從假入空觀七處徵心正當從假之時至下請示奢摩他路方是入空夫分圓即別融別即圓如來以圓義立宗阿難約方便立問圓別不相礙也亦非別無以顯圓非圓無以融別法應爾也前體章中明三番進否進否之本實在于此何今人觀文而不察其義耶或謂諸經論中凡示修止觀法皆名三摩提故三摩提是通名首楞嚴是別號其説良是但三摩提所以為通名者正以其專心一境無事不辦故經論皆用此名既專一境豈非假耶次第三觀中初觀既爾從空出假其義亦然如前所引將欲敷演諸三摩提妙修行路是其文也以欲從空出假故先演奢摩他微密觀照而後明諸三摩提也作此消釋不唯符合瓔珞而今經奧旨亦煥然矣然雖含次第經意在圓故云妙修行路謂諸三摩提一一達之莫非圓觀是入菩提之路也至三卷七大之文約次第説即同瓔珞二觀為方便得入中道第一義諦問若順次第前明空假至此宜明中道若依圓頓前已明中至此何復請中道耶答如來立義以圓兼別阿難請問多約別教為欲成最初方便故也然所請者乃是中道了義謂前非無中但明惟心未明性具今須明性具七大方是了義又因緣自然二俱排擯乃中道雙遮之義須更明性具七大則進照咸備方是了義所以七大文後了義方彰阿難大衆即説偈讚佛也問次第三諦先空次假後中不聞先觀假法答從假入空名空前之假從空出假是空後之假經文如此非任胸臆圓頓教中假亦居首輔行二十一卷云三諦無形俱不可見然即假法可寄事辨即此假法即空即中空中二理二無二也據輔行此文豈非假觀居首耶十不二門云照故三千恆具遮故法爾空中荊溪此言假亦居首三千即假法也妙樂釋經萬二千人俱觀心文中云境據假邊且存其數空中尚無其數安在然必約假以立空中觀亦如是今楞嚴首云三摩提者亦約假以立空中也應知三觀畢竟在一心中不分先後而用觀時必托假法而起苟不觀假何由入空中之理也今經前三卷約次第以論不次節節皆圓別并明而意在圓無非一心三諦釋者豈可得權失實得實失權耶四卷富那問答審除細惑廣明如來藏理結顯前來圓義觀此問答知佛意唯在圓宗也至諸聖圓通會之皆是楞嚴大定六十聖位無非妙契一心三止圓通非無偏小會之皆圓故云彼等修行實無優劣聖位雖非別教借別明圓故欲登初地更立四加行維摩云有方便慧解無方便慧縛今經是有方便之慧涅槃云二鳥雙遊今經實雙遊之旨乎及後廣揀陰魔文中三名皆見如云十種禪那此則以禪那之名該餘二止也又云彼善男子修三摩提奢摩他中色陰盡者是必以二止該禪那也正止觀例歷餘心皆即三諦亦即三觀正觀一心既爾歷觀發得亦然故奢摩等三名一經前後互出各有其義可但云舉一即三乎問此經之宗為多在因為多在果答般若經以因為宗涅槃經以果為宗今既云密因修證了義即并用因果為宗而正意在因如初請云最初方便二卷云非無學者茫然不知是義終始四卷請入華屋爾時世尊哀憫會中緣覺聲聞發菩提心未自在者及為末法衆生開無上乘妙修行路簡圓通偈云初心入三昧遲速不同倫乃至辨陰魔文初云汝等有學緣覺聲聞今日回心趣大菩提無上妙覺經末云并初發心大力鬼神皆大歡喜如上諸文咸誨初心之人是知當以因心徹果而為宗耳問何不取觀音耳根以定修止觀之法耶答行門方便的在耳根今通一部云三止觀也四辨用者此經以斷愛遠塵為用若據經題以諸菩薩萬行首楞嚴為用考玄籤用分二種有宗家之用有用家之用宗家之用屬乎自行所謂智德為宗斷德為用也用家之用屬乎逗機所謂化他智斷俱為用也今題中萬行首楞嚴無乃為宗家之用乎菩薩以三止為正修萬行為助用而復取斷愛遠塵者乃用家之用也蓋體宗精深用宜言淺而意深故法華經力令人一生成佛然但以斷疑生信為用金光明經諸經之王而以照耀諸天心生歡喜為用今經亦然歷觀前後告誡是以斷淫為首務也蓋障道之緣莫如愛欲阿難大權示墮淫室正為發起之由歸來見佛便言欲氣粗濁向下世尊頻頻訶斥唯在貪欲乃至殺貪盜貪亦以欲貪為本生死根元唯此非他故四十二章經云賴有一矣若使二同普天之人無能為道者今經勝用實在斷淫所以佛敕文殊將呪往護惡呪銷滅提獎阿難及摩登伽歸來佛所乃至悟宿世因貪愛為苦一念熏修無漏善故即得出纏呪之力也又云塵既不緣根無所偶身心快然是人即獲無生法忍經之力也此雖淺事根元至深故先放頂光以照之無為心佛無上心呪以破之非大智文殊不敕非觀音圓通不選須知一念起心根塵相偶即為愛欲之因若非耳根圓通不能頓破經云如重睡人眠熟床枕惑舂米音為木石響是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏如經所言是明聞性超根塵識而此聞性根本實即當人一念心王也靜搖塵也開閉根也憶即識也聞性超此三種若親到此地便能頓破根塵復超空有二邊叵得中道不存故文殊云我亦從中證非唯觀世音其所以能破先梵天呪者豈徒然哉又十信去諸賢聖位必從乾慧發源復云至等覺已始獲金剛心中初乾慧地然則經之力用何必舍此而別求其至深者耶故知用家之用能該宗家之用菩薩萬行所以究竟堅固者由斷愛之力爾問有用家之用亦有用家之宗否答妙玄云自行以智德為宗斷德為用若化他自他智斷俱為宗化他智斷俱為用籤解云自他智斷俱為宗者自行以智德為宗化他以斷德為宗也問宗家之用能該用家之用否答正義如此如菩薩萬行可該斷淫今又深言斷淫之力能該萬行互攝明矣五判教者當以方等被開成醍醐為此經之教相元夫如來説法而有五時一華嚴二阿含三方等四般若五法華涅槃時今此楞嚴一經或判之于法華之後如孤山吳興二師是也或判歸于般若法華之間如溫陵環師是也或直判為方等生酥如百松幽溪二師是也竊研三説各有所據如此經歎德超過餘經諸聲聞衆皆大菩薩既開權顯實亦開迹顯本則宜屬于法華開顯之義然因果經云佛與波斯匿王同日而生則佛説是經年六十二菩提流支法界性論云佛年七十二歲説法華經則判此經于般若法華之間信不誣矣又此經中具有四教如云色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真心中物豈非圓教又云頭自動搖見無所動手自開合見無舒卷及八還辨見等文宜屬別教處處用四句推檢則通通教聲聞四棄八棄則通藏教又處處有彈偏斥小嘆大褒圓之言判屬方等不亦宜乎今謂此經元是方等而説時在般若法華之間蓋通五時中文通之類有如此者但結集經家實取開顯之意以結此經所以嘆德之語勝法華也應知此經説非一時初卷中波斯匿王諱日營齋洎談七趣則曰琉璃廢父墜海而終匿王父也琉璃子也既歷父子之存亡則説時甚久始則摩登伽女攝阿難入淫席後云或得出纏或蒙授記夫性比丘尼縱是利根速取無學而耶輸受成佛記實在法華豈應作餘解乎即中云此經初會所説徵心辨見等文的屬方等四五卷去是法華後説若爾何無般若考阿難于佛成道日生八歲出家至年二十餘方為侍者則已當般若之時然誤墮淫席之機豈宜聞融通之教方等彈斥正其宜也此時為阿難別説方等為大衆總談般若阿難豈不聞般若耶既聞生熟二酥後聞法華開佛知見所以受山海慧自在通王之記也味此經中五陰三科會入如來藏性與般若八十一科會歸摩訶衍其義何殊但經題無般若之稱不得同般若耳所以同法華開顯者如後經題五名有妙蓮華之言則同法華可無惑也問方等陀羅尼經云昔於王舍城授聲聞記今復于舍衛國祇陀林中授聲聞記然彼經尚屬方等今豈便同醍醐答輔行云方等隱密與記不同法華顯露與記顯久遠本據輔行此言今經授記可同方等雖有妙蓮華之言亦是隱密同法華爾但今經與餘經不同何者餘經當機非是阿難故不露開顯大意今經當機即是阿難阿難是結集人其所聞開權顯實開迹顯本之旨于經首略見一班如云與大比丘衆千二百五十人俱皆是無漏大阿羅漢佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫衆生拔濟未來越諸塵纍上是阿難通序之文正明諸大弟子已住首楞嚴定古解首楞嚴定者不起滅定現諸威儀今云佛子住持善超諸有諸有即二十五有既能超之詎非大乘滅盡定耶又云能于國土成就威儀豈非現諸威儀耶次八句釋上首楞嚴定初從佛轉輪妙堪遺囑釋佛子住持也嚴淨毗尼弘範三界釋善超諸有也若不具大乘十戒烏能生大乘滅定又既超諸有即可為三界之軌範矣應身下四句釋能於國土成就威儀久得法報之本現身十界故應化無量更拔濟未來則非小乘灰身滅智之比此文中先標後釋皆示諸大弟子已住首楞大定開聲聞乘即菩薩道是開權顯實本是菩薩外現聲聞是開迹顯本故據結集人意實取開顯之意以集此經既於經首開顯則是經必同醍醐明矣據經但是密同據結集人即是顯同須知前四時經既被法華開顯盡成圓妙今特於楞嚴示開顯之相餘可例知是則阿難之意乃以此經為開會之法式一化之大意智者於玄句中開教阿難於通序中開教當有何咎又凡言開者開於可開經中密同已具可開之勢結經者遂於序中開之此著述之權不可奪也問今經當機雖是阿難何須定露開顯大意答餘經各有當機懷疑叩佛佛為除疑結集者據一時之問答結集成經足明利益餘人續聞開顯悟解轉深其得益在心非阿難所能記也今經是阿難自記所聞歷二十餘年但成一部所述悟門若不及開顯即有遺漏況誤墮淫席元是示迹可不表本地耶又餘經各有諸品當機非一今經不立品名雖有富那文殊問答而大意專在阿難須盡述一人之悟故順結集之意云開顯爾然此經與法華復異如云十方如來於十八界一一修行亦無優劣復云此二十五無學諸大菩薩及阿羅漢各説最初成道方便皆言修習真實圓通彼等修行實無差別是開權也又云令汝但於一門深入即施別教之權也定性聲聞皆獲一乘寂滅場地是開權也後阿難復證小乘仍施藏通之權也權用三教以為蘇息實不保權以為究竟當與涅槃同義扶律談常其旨亦同若爾何不攝前歸後但屬醍醐乃指經初所説仍同方等答此經既兼權小況諱日營齋初會所説實在法華以前不得判同涅槃今以為方等被開成醍醐則無失矣考長水璿公亦云此經非一時所説説必前後近代憨公復云此經不可局定一時今所判釋幸合古轍來哲評之判教竟三引證者八卷中文殊問名如來共答五名即合五重玄義一云是經名大佛頂悉怛哆般怛囉無上寶印十方如來清淨海眼此證體也大佛頂是實相之體悉怛哆等雖是呪名而通於顯教妙玄云小乘經有三印大乘唯一實相印今云無上寶印豈非實相印乎如來以此而照窮法界無一相可得名清淨海眼正如妙玄取佛所見為實相正體也二云亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海此證用也夫歷劫親因以受纏縛今能斷愛與無明父母別是真救護既窮愛見之本所以得菩提心入遍知海證此經以斷愛成菩提為用明矣三云亦名如來密因修證了義此證宗也密因是圓解修是圓因證是圓果密之為言所以讚因了義之稱所以讚修證也此經開解起行俱帶方便明證唯圓以阿難初請有最初方便之語故解行帶權殊非揀選然正意唯在圓教後明地位是指歸之處其義純圓而借別明圓所以接引別教則經宗在一乘明矣雖並標因果實以因心該果四云亦名大方廣妙蓮華王十方佛母陀羅尼呪此證教相也大方廣似同華嚴然但義同而已約時而論不可判屬華嚴正可冠於妙蓮華之上耳吳興云大方廣所説之法也大方是體廣是其用即空如來藏具不空之用也又常遍曰大軌持曰方包富曰廣如次配法身般若解脫亦如來藏之三德也即中云三字具含體宗用三三者合則可論教相矣妙蓮華王名同法華今經有權有實指權即實名妙蓮華統攝自在故云王也次十方佛母陀羅尼呪乃是呪名如方等陀羅尼經云此陀羅尼呪乃可為父乃可為母又云諸佛道皆從此生是佛父母今經正與彼同彼經既密同法華則今經亦密同法華宜屬方等明矣阿難於序中已明開顯是則經文密同結集顯同有密同故方得顯同總判此經必是方等被開成醍醐為教相也五云亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持此證經名也灌頂章句者中天竺國大乘祕典而有五部東方金剛部阿閦佛以為部主南方寶生部寶生佛以為部主西方蓮華部無量壽佛以為部主北方羯磨部不空成就佛以為部主中央灌頂部毗盧遮那佛以為部主吳興曰此經從灌頂部中流出蓋約密言名灌頂章句有誦持者則如來智水灌其心頂亦如剎利之受職也菩薩因此受佛職位故諸菩薩萬行首楞嚴當是經名然上句從呪得稱而義通於經下句從經得稱而名通於呪菩薩萬行不出三止觀三止觀在一心中萬行具矣蓋今經之宗雖具因果而意在於因所以最後一名獨標菩薩又此名在釋題中判屬於用但是宗家之用非用家之用然萬行之言可攝用家之用故以配用茲五名中救護親因別當力用則不須配用而以為經名之要不亦宜乎如一卷云有三摩提名大佛頂首楞嚴王又云首楞嚴王世希有其為別顯經名無疑矣問五題皆是經名何獨以此屬名答五名既多稱者不能盡舉名中之要莫過於此如今世人名此經為楞嚴雖是凡語亦聖旨也如上所説五重既備足堪受持遂結云汝當奉持引證竟四生起者經體既要故居其首證體必有用用居其次依經修行有因果之宗故居其三三章既備須定教相而稱名者不能多舉因結顯名中之要五者具矣能該別文孰謂玄義非佛説乎生起竟二釋別名者一名中印度那爛陀大道場經於灌頂部中録出別行長水曰此別目也印度名月具云印特伽此云月以此大國形諸小國如星中月彼有五印此當中也即一境之都名一境之中有多國別最中大者號摩竭提此云大體以總攝故或云不害皆義翻也那爛陀此云施無厭龍名西域記云菴摩羅國有池池中有龍名施無厭寺近彼池故以標號大道場者沙門體心修道之地也佛滅度後六帝緝興遐疏紺宇園林普洽都建一門主客萬僧住持增峻印度諸寺莫先于此故名曰大灌頂部者彼有五部此當其一毗盧為主既標部處尋驗可憑無謂近翻疑非正説二明譯人者大唐神龍元年龍集乙巳五月乙卯朔二十三日辛丑長安三年則天罷政中宗嗣位是歲改為神龍元年龍集者龍星亦云歲星歲行一次也集居也乙巳即所舍之次朔穌也月死復穌也中天竺沙門般剌密諦于廣州制止道場譯天竺亦云乾竺乾豆身毒印度等沙門此云勤息生善滅惡之稱般剌密諦此云到彼岸譯之言易也易梵為華耳周制達四方之言東方曰寄南方曰象西方曰狄鞮北方曰譯今翻西語而云譯者由漢世多事北方而譯人兼善西語因以稱焉又寄等四別也譯言通也烏萇國沙門彌伽釋迦譯語國名未詳彌伽釋迦此云能降伏翻梵為華故云譯語其中證義應有別録餘如翻譯時年中説菩薩戒弟子前正諫大夫同中書門下平章事清河房融筆授雖為宰官而受大乘戒者經云欲受國王位時乃至百官受位時應先受菩薩戒一切鬼神救護王身及百官身也弟子者資于師長以父兄之道事之故云弟子正諫者今之諫議也舉賢達能大扶進人故曰大夫中書門下二省之名平和章明國政之事曰平章事筆授或云筆受謂以此方文體筆其所授梵本緝綴潤色令順物情不失正理也初密諦割膊藏經泛海達廣州制止寺遇宰相融知南銓聞有此經遂請對譯經苦血凝融妻以水清之方得就筆是皆有功于正法者例得並書經首四系凡例十條此經前七卷正觀總無明心以明修證後三卷約別能招報心以明修證是十卷大綱字字皆歸心觀大意既定至文略點即可例之前後故不繁瑣此經以現前一念陰心為所觀境以一心三觀為能觀觀能觀三觀在文顯然所觀識心如七處徵逐會見歸心聞性逈脫根塵等皆是也吳門即中大師存有疏稿凡剖判大途率由蠡測消釋文句多所遵用必標即中云者一不忍先輩手眼湮沒無傳一不敢濫貪人力坐享其成以冒盜竊之譏耀自癸丑初秋應講海潮即事判釋七八年來雖時有所得皆草㔙未成今己未春應住楞嚴寺係長水大師講楞嚴以感雨華瑞雲而成疏之處似符夙願者然因而綴緝成書故仰遵長水義疏十居二三亦先標長水二字者不敢攘為己有也凡科段大章皆自臆見蓋科含全義大局既定則網目瞭然況先賢注疏於七趣五陰皆依樣葫蘆俱無定見以致兩章位置仍虗名字錯喚今依正觀總無明心約別能招報心以判則不惟後之兩章名義確然益顯前之七卷節節觀心字字有歸似乎千秋未定之案而今始定故曰觀心定解凡細科小節多用舊人蓋丸劑均貴於定方不必藥味皆自創有也另刻科中或曰先曰次曰一曰二及與隨經解釋中字數多少稍異陰魔內小科有不録出者文隨義便初無拘局凡科下之注是大義經後之注是釋文通部例之凡先貫一圈者是科無圈者即解通部例之凡出交光異解處必先標其文方為辨明恐誤後人謗法墮苦非好為是否至於解釋合宜處亦必遵用不敢沒人之長
